  <title
     id="title">How Ripley's K measures spatial aggregation across distances</title>
  <desc
     id="desc">A three-step diagram. First, a spatial point pattern is shown. Second, five other points within distance r of a focal point are counted, and the operation is repeated for every point and many distances. Third, the observed K curve is compared with the homogeneous planar Poisson reference pi r squared and an illustrative simulation envelope. Departures beyond the envelope indicate unusually many or few neighboring pairs at those distances. Practical estimates use edge correction, and an inhomogeneous K function may be needed when intensity varies spatially.</desc>
